services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: decision_engine_test
      POSTGRES_USER: decision_engine
      POSTGRES_PASSWORD: decision_engine
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision_engine -d decision_engine_test"]
      interval: 2s
      timeout: 2s
      retries: 20


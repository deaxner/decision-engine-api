security:
  password_hashers:
    App\Domain\Decision\Entity\User:
      algorithm: auto
  providers:
    app_user_provider:
      entity:
        class: App\Domain\Decision\Entity\User
        property: email
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    main:
      lazy: true
      provider: app_user_provider

